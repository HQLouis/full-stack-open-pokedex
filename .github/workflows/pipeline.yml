name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize ]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - name: Build
        id: build
        run: npm run build
      - name: Send failure notification
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: warning
          details: Build failed (LNG)
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Run tests
        run: npm run test
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: trigger deploy by hook
        run: curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

  tag_release:
    if: ${{ github.event_name == 'push' && !contains(toJson(github.event.commits.*.message), '#skip') }}
    runs-on: ubuntu-latest
    needs: [simple_deployment_pipeline, test, deploy]
    steps:
      - uses: actions/checkout@v4
      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: New version deployed
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: info
          details: New version deployed to production (LNG)
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}


  a_test_job:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: echo "$COMMITS"
      - name: commit messages
        env:
          COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: echo "$COMMIT_MESSAGES"
      - name: commit has text skip
        if: ${{ github.event_name == 'push' && contains(toJson(github.event.commits.*.message), '#skip') }}
        run: echo "There is a \#skip in the commit message"
      - name: commit has no text skip
        if: ${{ github.event_name == 'push' && !contains(toJson(github.event.commits.*.message), '#skip') }}
        run: echo "There is no \#skip in the commit message"
    
  sending_test_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Print all secretes
        run: echo "${{ toJson(secrets) }}"
      - name: Check if secret is accessible
        run: echo "${{ secrets.DISCORD_WEBHOOK }}"
      - name: Send test notification
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: info
          details: LNG This is a test notification
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Send success notification
        if: success()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: info
          details: LNG Build succeeded
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Send failure notification
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: warning
          details: LNG Build failed
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
